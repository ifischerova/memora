name: Build & release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Create versionless installer copy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item (Get-ChildItem dist/Memora-Setup-*.exe | Select-Object -First 1).FullName dist/Memora-Setup.exe
      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
