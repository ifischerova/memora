name: Build & release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Third-party actions are pinned to full commit SHAs (not mutable tags) so a
      # compromised or repointed tag cannot inject code into the release pipeline.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build -- --publish never
      - name: Create versionless installer copy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item (Get-ChildItem dist/Memora-Setup-*.exe | Select-Object -First 1).FullName dist/Memora-Setup.exe
      - name: Create versionless package copies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cp "$(ls dist/Memora-*-linux-*.deb | head -n1)" dist/Memora.deb
          cp "$(ls dist/Memora-*-linux-*.AppImage | head -n1)" dist/Memora.AppImage
      - name: Generate SHA-256 checksums
        run: node scripts/checksums.js dist/SHA256SUMS-${{ runner.os }}.txt
      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.deb
            dist/*.AppImage
            dist/SHA256SUMS-*.txt
