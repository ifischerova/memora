<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memora — Vaše vzpomínky popořadě</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="nav">
    <div class="brand"><span class="logo">M</span><strong>Memora</strong></div>
    <div class="controls">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
      <div class="lang"><button data-lang="cs" class="active">CZ</button><button data-lang="en">EN</button></div>
    </div>
  </header>

  <section class="hero">
    <h1 data-i18n="heroTitle"></h1>
    <p class="lead" data-i18n="heroLead"></p>
    <div class="downloads">
      <a class="dl-btn" id="dlWin" href="#"><span class="dl-os">Windows</span></a>
      <a class="dl-btn" id="dlMac" href="#"><span class="dl-os">macOS</span></a>
      <a class="dl-btn" id="dlDeb" href="#"><span class="dl-os">Debian / Ubuntu</span></a>
      <a class="dl-btn" id="dlAppImage" href="#">
        <span class="dl-os">Linux</span>
        <span class="dl-kind" data-i18n="dlAppImageKind"></span>
      </a>
    </div>
    <p class="sub" data-i18n="heroSub"></p>
    <a class="releases-link" id="releasesLink" href="#" data-i18n="otherDownloads"></a>
  </section>

  <section class="showcase">
    <img src="screenshots/app-light.png" alt="Memora app — sorting photos into year/month folders" />
  </section>

  <section class="steps">
    <div class="step"><div class="num">1</div><h3 data-i18n="step1t"></h3><p data-i18n="step1d"></p></div>
    <div class="step"><div class="num">2</div><h3 data-i18n="step2t"></h3><p data-i18n="step2d"></p></div>
    <div class="step"><div class="num">3</div><h3 data-i18n="step3t"></h3><p data-i18n="step3d"></p></div>
  </section>

  <section class="features">
    <div class="feat"><h4 data-i18n="f1t"></h4><p data-i18n="f1d"></p></div>
    <div class="feat"><h4 data-i18n="f2t"></h4><p data-i18n="f2d"></p></div>
    <div class="feat"><h4 data-i18n="f3t"></h4><p data-i18n="f3d"></p></div>
    <div class="feat"><h4 data-i18n="f4t"></h4><p data-i18n="f4d"></p></div>
  </section>

  <footer class="foot">
    <p>© 2026 Iva Fischerova · MIT License · <a id="repoLink" href="#">GitHub</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
